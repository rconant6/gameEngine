<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZxlImage — Data Structure Relationships</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { color: #58a6ff; font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 2.5rem; }

  svg { overflow: visible; }

  /* Struct boxes */
  .struct-box { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 8; }
  .struct-box.main { stroke: #58a6ff; stroke-width: 2; }
  .struct-box.child { stroke: #d2a8ff; }
  .struct-box.leaf { stroke: #7ee787; }
  .struct-box.external { stroke: #f0883e; stroke-dasharray: 5,4; }

  /* Header bar inside struct */
  .struct-header { fill: #21262d; rx: 8; }

  /* Text styles */
  .struct-name { fill: #58a6ff; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
  .struct-name.child-name { fill: #d2a8ff; }
  .struct-name.leaf-name { fill: #7ee787; }
  .struct-name.ext-name { fill: #f0883e; }
  .field-name { fill: #79c0ff; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11.5px; }
  .field-type { fill: #7ee787; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11.5px; }
  .field-comment { fill: #8b949e; font-family: -apple-system, sans-serif; font-size: 10.5px; font-style: italic; }
  .fn-name { fill: #d2a8ff; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
  .fn-sig { fill: #8b949e; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10.5px; }
  .section-label { fill: #484f58; font-family: -apple-system, sans-serif; font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Relationship lines */
  .rel-line { stroke: #30363d; stroke-width: 1.5; fill: none; }
  .rel-line.owns { stroke: #58a6ff; stroke-width: 2; }
  .rel-line.refs { stroke: #f0883e; stroke-dasharray: 6,4; }
  .rel-line.produces { stroke: #7ee787; stroke-dasharray: 3,3; }

  /* Arrows */
  .arrow-owns { fill: #58a6ff; }
  .arrow-refs { fill: #f0883e; }
  .arrow-produces { fill: #7ee787; }

  /* Cardinality labels */
  .card-label { fill: #8b949e; font-family: 'SF Mono', monospace; font-size: 10px; font-weight: 600; }
  .rel-label { fill: #484f58; font-family: -apple-system, sans-serif; font-size: 10px; font-style: italic; }

  /* Legend */
  .legend-text { fill: #8b949e; font-family: -apple-system, sans-serif; font-size: 11px; }

  /* Pixel grid illustration */
  .pixel { stroke: #21262d; stroke-width: 0.5; }
</style>
</head>
<body>

<h1>ZxlImage Data Structure Relationships</h1>
<p class="subtitle">.zxl format internals &mdash; how palette, frames, and pixels connect</p>

<svg width="920" height="820" viewBox="0 0 920 820">

  <!-- ============ LEGEND ============ -->
  <g transform="translate(20, 10)">
    <line x1="0" y1="8" x2="30" y2="8" class="rel-line owns"/>
    <polygon points="30,4 38,8 30,12" class="arrow-owns"/>
    <text x="44" y="12" class="legend-text">owns</text>

    <line x1="110" y1="8" x2="140" y2="8" class="rel-line refs"/>
    <polygon points="140,4 148,8 140,12" class="arrow-refs"/>
    <text x="154" y="12" class="legend-text">references</text>

    <line x1="260" y1="8" x2="290" y2="8" class="rel-line produces"/>
    <polygon points="290,4 298,8 290,12" class="arrow-produces"/>
    <text x="304" y="12" class="legend-text">produces</text>

    <rect x="420" y="0" width="14" height="14" rx="3" fill="#161b22" stroke="#30363d" stroke-dasharray="5,4"/>
    <text x="440" y="12" class="legend-text">external / boundary</text>
  </g>

  <!-- ============ ZxlImage (MAIN) ============ -->
  <g transform="translate(260, 50)">
    <rect class="struct-box main" width="400" height="260"/>
    <rect class="struct-header" width="400" height="32" rx="8"/>
    <!-- clip bottom corners of header -->
    <rect fill="#21262d" x="0" y="20" width="400" height="12"/>
    <text x="200" y="22" text-anchor="middle" class="struct-name">ZxlImage</text>

    <text x="16" y="52" class="section-label">Fields</text>
    <text x="24" y="72" class="field-name">allocator</text>  <text x="120" y="72" class="field-type">Allocator</text>
    <text x="24" y="90" class="field-name">version</text>    <text x="120" y="90" class="field-type">u8</text>         <text x="160" y="90" class="field-comment">= 1</text>
    <text x="24" y="108" class="field-name">width</text>     <text x="120" y="108" class="field-type">u16</text>       <text x="160" y="108" class="field-comment">canvas dimensions</text>
    <text x="24" y="126" class="field-name">height</text>    <text x="120" y="126" class="field-type">u16</text>
    <text x="24" y="144" class="field-name">palette</text>   <text x="120" y="144" class="field-type">ZxlPalette</text> <text x="220" y="144" class="field-comment">embedded, 1 per image</text>
    <text x="24" y="162" class="field-name">frames</text>    <text x="120" y="162" class="field-type">[]ZxlFrame</text> <text x="220" y="162" class="field-comment">1..N frames</text>

    <text x="16" y="190" class="section-label">Methods</text>
    <text x="24" y="210" class="fn-name">init</text>         <text x="65" y="210" class="fn-sig">(alloc, w, h) -> ZxlImage</text>
    <text x="24" y="226" class="fn-name">addFrame</text>     <text x="100" y="226" class="fn-sig">(name) -> !*ZxlFrame</text>
    <text x="24" y="242" class="fn-name">toRgbaBuffer</text> <text x="130" y="242" class="fn-sig">(frame_idx, alloc) -> ![]u8</text>
  </g>

  <!-- ============ ZxlPalette ============ -->
  <g transform="translate(20, 380)">
    <rect class="struct-box child" width="340" height="230"/>
    <rect class="struct-header" width="340" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="340" height="12"/>
    <text x="170" y="22" text-anchor="middle" class="struct-name child-name">ZxlPalette</text>

    <text x="16" y="52" class="section-label">Fields</text>
    <text x="24" y="72" class="field-name">colors</text> <text x="100" y="72" class="field-type">[256][4]u8</text> <text x="210" y="72" class="field-comment">RGBA bytes</text>
    <text x="24" y="90" class="field-name">count</text>  <text x="100" y="90" class="field-type">u8</text>         <text x="140" y="90" class="field-comment">1-255 used entries</text>

    <text x="16" y="118" class="section-label">Convention</text>
    <text x="24" y="138" class="field-comment">index 0 = transparent (a=0)</text>
    <text x="24" y="155" class="field-comment">indices 1..count = opaque colors</text>

    <text x="16" y="180" class="section-label">Methods</text>
    <text x="24" y="198" class="fn-name">getColor</text>  <text x="100" y="198" class="fn-sig">(index: u8) -> [4]u8</text>
    <text x="24" y="214" class="fn-name">findColor</text> <text x="108" y="214" class="fn-sig">(rgba) -> ?u8</text>

    <!-- Pixel grid illustration -->
    <g transform="translate(250, 110)">
      <rect x="0"  y="0"  width="18" height="18" class="pixel" fill="#ff4444"/>
      <rect x="18" y="0"  width="18" height="18" class="pixel" fill="#44aaff"/>
      <rect x="36" y="0"  width="18" height="18" class="pixel" fill="#ffcc22"/>
      <rect x="54" y="0"  width="18" height="18" class="pixel" fill="#44dd66"/>
      <rect x="0"  y="18" width="18" height="18" class="pixel" fill="#dd66ff"/>
      <rect x="18" y="18" width="18" height="18" class="pixel" fill="#ff8844"/>
      <rect x="36" y="18" width="18" height="18" class="pixel" fill="#aaaaaa"/>
      <rect x="54" y="18" width="18" height="18" class="pixel" fill="#ffffff"/>
      <text x="36" y="52" text-anchor="middle" class="field-comment">colors[]</text>
    </g>
  </g>

  <!-- ============ ZxlFrame ============ -->
  <g transform="translate(560, 380)">
    <rect class="struct-box child" width="340" height="250"/>
    <rect class="struct-header" width="340" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="340" height="12"/>
    <text x="170" y="22" text-anchor="middle" class="struct-name child-name">ZxlFrame</text>

    <text x="16" y="52" class="section-label">Fields</text>
    <text x="24" y="72" class="field-name">name</text>         <text x="130" y="72" class="field-type">[]const u8</text>  <text x="235" y="72" class="field-comment">"walk_01"</text>
    <text x="24" y="90" class="field-name">duration_ms</text>  <text x="130" y="90" class="field-type">u16</text>         <text x="170" y="90" class="field-comment">0 = static</text>
    <text x="24" y="108" class="field-name">origin_x</text>    <text x="130" y="108" class="field-type">i16</text>        <text x="170" y="108" class="field-comment">pivot point</text>
    <text x="24" y="126" class="field-name">origin_y</text>    <text x="130" y="126" class="field-type">i16</text>
    <text x="24" y="144" class="field-name">pixels</text>      <text x="130" y="144" class="field-type">[]u8</text>       <text x="170" y="144" class="field-comment">palette indices</text>

    <text x="16" y="172" class="section-label">Methods</text>
    <text x="24" y="192" class="fn-name">getPixel</text> <text x="100" y="192" class="fn-sig">(x, y, width) -> u8</text>
    <text x="24" y="208" class="fn-name">setPixel</text> <text x="100" y="208" class="fn-sig">(x, y, width, index)</text>

    <!-- Pixel index grid illustration -->
    <g transform="translate(215, 155)">
      <rect x="0"  y="0"  width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="11" y="13" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">3</text>
      <rect x="22" y="0"  width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="33" y="13" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">1</text>
      <rect x="44" y="0"  width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="55" y="13" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">0</text>
      <rect x="66" y="0"  width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="77" y="13" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">2</text>

      <rect x="0"  y="18" width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="11" y="31" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">5</text>
      <rect x="22" y="18" width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="33" y="31" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">1</text>
      <rect x="44" y="18" width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="55" y="31" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">4</text>
      <rect x="66" y="18" width="22" height="18" class="pixel" fill="#21262d"/>
      <text x="77" y="31" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">1</text>
      <text x="44" y="52" text-anchor="middle" class="field-comment">pixels[]</text>
    </g>
  </g>

  <!-- ============ RELATIONSHIP LINES ============ -->

  <!-- ZxlImage -> ZxlPalette (owns, 1:1) -->
  <path d="M 380,310 L 380,340 Q 380,360 360,360 L 200,360 L 200,380"
        class="rel-line owns" marker-end="url(#arrow-owns)"/>
  <text x="250" y="353" class="card-label">1</text>
  <text x="300" y="353" class="rel-label">embeds</text>

  <!-- ZxlImage -> ZxlFrame (owns, 1:N) -->
  <path d="M 540,310 L 540,340 Q 540,360 560,360 L 720,360 L 720,380"
        class="rel-line owns" marker-end="url(#arrow-owns)"/>
  <text x="620" y="353" class="card-label">1..N</text>
  <text x="660" y="353" class="rel-label">owns</text>

  <!-- ZxlFrame pixels -> ZxlPalette (references) -->
  <path d="M 560,524 L 480,524 Q 460,524 460,510 L 460,490 Q 460,470 440,470 L 360,470"
        class="rel-line refs" marker-end="url(#arrow-refs)"/>
  <text x="410" y="460" class="rel-label">pixel values index into</text>

  <!-- ============ RGBA BUFFER (output) ============ -->
  <g transform="translate(260, 690)">
    <rect class="struct-box leaf" width="400" height="100"/>
    <rect class="struct-header" width="400" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="400" height="12"/>
    <text x="200" y="22" text-anchor="middle" class="struct-name leaf-name">[]u8 (RGBA Buffer)</text>

    <text x="16" y="52" class="section-label">Produced by toRgbaBuffer()</text>
    <text x="24" y="72" class="field-comment">Flat RGBA: for each pixel, palette[index] expanded to 4 bytes</text>
    <text x="24" y="88" class="field-comment">len = width * height * 4 &mdash; ready for GPU texture upload</text>
  </g>

  <!-- ZxlImage -> RGBA buffer (produces) -->
  <path d="M 460,310 L 460,670 L 460,690"
        class="rel-line produces" marker-end="url(#arrow-produces)"/>
  <text x="466" y="660" class="rel-label">expands palette</text>

  <!-- ============ EXTERNAL: ZxlHandle ============ -->
  <g transform="translate(20, 690)">
    <rect class="struct-box external" width="200" height="100"/>
    <rect class="struct-header" width="200" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="200" height="12"/>
    <text x="100" y="22" text-anchor="middle" class="struct-name ext-name">ZxlHandle</text>

    <text x="16" y="52" class="section-label">Asset System</text>
    <text x="24" y="72" class="field-name">id</text> <text x="50" y="72" class="field-type">usize</text>
    <text x="24" y="88" class="field-comment">opaque ref into ZxlManager</text>
  </g>

  <!-- ZxlHandle -> ZxlImage (references) -->
  <path d="M 120,690 L 120,660 Q 120,640 140,640 L 240,640 Q 260,640 260,620 L 260,310"
        class="rel-line refs" marker-end="url(#arrow-refs)"/>
  <text x="140" y="633" class="rel-label">resolves to</text>

  <!-- ============ EXTERNAL: TextureSprite ============ -->
  <g transform="translate(700, 690)">
    <rect class="struct-box external" width="200" height="120"/>
    <rect class="struct-header" width="200" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="200" height="12"/>
    <text x="100" y="22" text-anchor="middle" class="struct-name ext-name">TextureSprite</text>

    <text x="16" y="52" class="section-label">ECS Component</text>
    <text x="24" y="72" class="field-name">zxl_handle</text>  <text x="120" y="72" class="field-type">ZxlHandle</text>
    <text x="24" y="88" class="field-name">frame_index</text> <text x="120" y="88" class="field-type">u16</text>
    <text x="24" y="104" class="field-name">tint</text>       <text x="120" y="104" class="field-type">?Color</text>
  </g>

  <!-- TextureSprite -> ZxlHandle (references) -->
  <path d="M 700,750 L 240,750 L 220,750 L 220,790"
        class="rel-line refs"/>
  <path d="M 220,790 L 220,750 L 190,750 Q 170,750 170,770 L 120,770 L 120,790"
        class="rel-line refs" marker-end="url(#arrow-refs)"/>
  <!-- simpler: just draw to handle -->
  <!-- override with cleaner path -->

  <!-- ============ ARROW MARKERS ============ -->
  <defs>
    <marker id="arrow-owns" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" class="arrow-owns"/>
    </marker>
    <marker id="arrow-refs" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" class="arrow-refs"/>
    </marker>
    <marker id="arrow-produces" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" class="arrow-produces"/>
    </marker>
  </defs>

</svg>

<!-- ========== CONVERSION FLOW DIAGRAM ========== -->
<h1 style="margin-top: 3rem;">Canvas &harr; ZxlImage Conversion</h1>
<p class="subtitle">zxl_export.zig &mdash; how pixel art on the canvas becomes a .zxl file and back</p>

<svg width="920" height="960" viewBox="0 0 920 960">

  <!-- ============ SAVE DIRECTION LABEL ============ -->
  <text x="460" y="28" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="700"
        font-family="-apple-system, sans-serif">SAVE: canvasToZxlImage()</text>
  <text x="460" y="46" text-anchor="middle" fill="#8b949e" font-size="11"
        font-family="-apple-system, sans-serif">Canvas &rarr; ZxlImage &rarr; .zxl file (Ctrl+S)</text>

  <!-- ============ STEP 1: Canvas ============ -->
  <g transform="translate(40, 70)">
    <rect class="struct-box" width="840" height="160" style="stroke: #d2a8ff;"/>
    <rect class="struct-header" width="840" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="840" height="12"/>
    <text x="420" y="22" text-anchor="middle" class="struct-name child-name">Canvas.pixels[]</text>

    <text x="16" y="55" class="section-label">Each PixelCell has a Color with full RGBA + HSVA</text>

    <!-- Visual: grid of colored pixels with Color structs underneath -->
    <g transform="translate(30, 68)">
      <!-- Row of colored pixel cells -->
      <rect x="0"   y="0" width="55" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="8"   y="6" width="16" height="16" fill="#ff4444" stroke="#21262d" rx="2"/>
      <text x="30"  y="14" class="field-name" font-size="9">Color</text>
      <text x="8"   y="34" class="field-comment" font-size="8">rgba: {255,68,68,255}</text>

      <rect x="65"  y="0" width="55" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="73"  y="6" width="16" height="16" fill="#44aaff" stroke="#21262d" rx="2"/>
      <text x="95"  y="14" class="field-name" font-size="9">Color</text>
      <text x="73"  y="34" class="field-comment" font-size="8">rgba: {68,170,255,255}</text>

      <rect x="130" y="0" width="55" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="138" y="6" width="16" height="16" fill="#ff4444" stroke="#21262d" rx="2"/>
      <text x="160" y="14" class="field-name" font-size="9">Color</text>
      <text x="138" y="34" class="field-comment" font-size="8">rgba: {255,68,68,255}</text>

      <rect x="195" y="0" width="55" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="203" y="6" width="16" height="16" fill="#ffcc22" stroke="#21262d" rx="2"/>
      <text x="225" y="14" class="field-name" font-size="9">Color</text>
      <text x="203" y="34" class="field-comment" font-size="8">rgba: {255,204,34,255}</text>

      <rect x="260" y="0" width="55" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="268" y="6" width="16" height="16" fill="#44aaff" stroke="#21262d" rx="2"/>
      <text x="290" y="14" class="field-name" font-size="9">Color</text>
      <text x="268" y="34" class="field-comment" font-size="8">rgba: {68,170,255,255}</text>

      <text x="330" y="20" fill="#484f58" font-size="16">...</text>

      <!-- annotation -->
      <text x="380" y="10" class="field-comment" font-size="10">64 x 64 = 4096 PixelCells</text>
      <text x="380" y="26" class="field-comment" font-size="10">each stores full Color struct</text>
      <text x="380" y="42" class="field-comment" font-size="10">(rgba + hsva, shape ignored on save)</text>
    </g>

    <!-- note about shape -->
    <text x="30" y="145" class="field-comment" font-size="10">
      PixelCell.shape (ShapeData) is rendering geometry only &mdash; discarded on save, rebuilt on load
    </text>
  </g>

  <!-- ============ ARROW DOWN: Step 1 -> Step 2 ============ -->
  <g transform="translate(440, 235)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="-5,35 0,45 5,35" fill="#58a6ff"/>
  </g>
  <text x="460" y="260" class="rel-label" font-size="11">Step 1: scan all pixels, collect unique RGBA values</text>

  <!-- ============ STEP 2: Deduplicate colors -> Palette ============ -->
  <g transform="translate(40, 280)">
    <rect class="struct-box" width="840" height="140" style="stroke: #7ee787;"/>
    <rect class="struct-header" width="840" height="32" rx="8"/>
    <rect fill="#21262d" x="0" y="20" width="840" height="12"/>
    <text x="420" y="22" text-anchor="middle" class="struct-name leaf-name">Build ZxlPalette</text>

    <text x="16" y="55" class="section-label">Deduplicate: 4096 pixels -> N unique colors</text>

    <g transform="translate(30, 68)">
      <!-- Index 0 -->
      <rect x="0" y="0" width="90" height="45" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="8" y="15" class="field-comment" font-size="9">index 0</text>
      <rect x="8" y="20" width="14" height="14" fill="#0d1117" stroke="#484f58" rx="2"/>
      <text x="26" y="31" class="field-type" font-size="9">{0,0,0,0}</text>
      <text x="45" y="43" class="field-comment" font-size="8">transparent</text>

      <!-- Index 1 -->
      <rect x="100" y="0" width="90" height="45" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="108" y="15" class="field-comment" font-size="9">index 1</text>
      <rect x="108" y="20" width="14" height="14" fill="#ff4444" stroke="#21262d" rx="2"/>
      <text x="126" y="31" class="field-type" font-size="9">{255,68,68,255}</text>

      <rect x="184" y="6" width="24" height="18" class="pixel" fill="#21262d"/>

      <rect x="208" y="6" width="24" height="18" class="pixel" fill="#21262d"/>

  <!-- ============================================================ -->

  <line x1="40" y1="800" x2="880" y2="800" stroke="#21262d" stroke-width="1"/>

    <text x="590" y="64" text-anchor="middle" class="field-comment" font-size="9">only color data is restored</text>

    <!-- Arrow -->

    <text x="787" y="58" text-anchor="middle" class="field-comment" font-size="10">pixel-perfect</text>
